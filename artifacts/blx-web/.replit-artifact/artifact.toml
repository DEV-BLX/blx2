kind = "web"
previewPath = "/"
title = "BLX - Blue Label Exchange"
version = "1.0.0"
id = "artifacts/blx-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23578

[services.development]
run = "pnpm --filter @workspace/blx-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blx-web", "run", "build" ]
publicDir = "artifacts/blx-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23578"
BASE_PATH = "/"
